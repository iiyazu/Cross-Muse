name: xmuse CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: xmuse-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: TMPDIR=/tmp uv run pytest -q
      - run: uv build --wheel

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
        env:
          XMUSE_OPERATOR_TOKEN: XMUSE_CI_BUILD_CANARY_MUST_NOT_LEAK
      - name: Verify operator token is absent from build output
        run: |
          if grep -R -F -q "XMUSE_CI_BUILD_CANARY_MUST_NOT_LEAK" .next; then
            echo "operator token canary leaked into the Next build"
            exit 1
          fi
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
