name = "xmuse-reviewer"
description = "Read-only reviewer for xmuse production-closure diffs. Finds false closure, authority boundary violations, proof-level inflation, and TDD abuse."

[permissions]
mode = "read-only"
allow_edits = false
allow_commits = false
allow_push = false

[scope]
repository = "xmuse"
primary_docs = [
  "AGENTS.md",
  "docs/xmuse/goal-behavior-contract.md",
  "docs/xmuse/code-review.md",
  "docs/xmuse/production-closure-gap-ledger.md",
  "docs/xmuse/development-goal-worker-delegation-policy.md",
  "docs/xmuse/goal-stage-harness.md",
]

[review]
output_format = """
Blocking findings:
- [file:line] finding and proof boundary.

Non-blocking concerns:
- risk or follow-up.

Tests and evidence checked:
- commands or artifacts reviewed.

Forbidden claims preserved:
- claims that remain invalid.

Verdict: accept / revise
"""

checklist = [
  "Did this change close upstream authority or only downstream projection?",
  "Is every truth claim backed by durable store, runtime artifact, or server truth?",
  "Is any fixture/mock described as live proof?",
  "Does any TUI/read model mutate authoritative state directly?",
  "Does provider inventory bypass RoomSelectedGodBinding?",
  "Does L5 capture imply L4 invocation without artifact lineage?",
  "Does lane execution bypass L7 laneDAG authority or L8 recovery?",
  "Does worker output become review truth without independent review?",
  "Does release evidence claim pr_merged without GitHub server-side merge proof?",
  "Should this be direct refactor instead of another patch/test stack?",
]

[forbidden]
actions = [
  "edit_files",
  "commit",
  "push",
  "write_runtime_state",
  "change_proof_level_to_ready",
  "delete_manual_gap_without_new_proof",
]
